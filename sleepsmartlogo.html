<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SleepSmart | Large Animated Logo</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #0f172a;
    font-family: 'Segoe UI', sans-serif;
}

.logo-container {
    text-align: center;
    width: 100%;
}

svg {
    /* Large scale */
    width: 500px; 
    height: auto;
    cursor: pointer;
    /* Ensuring the marker (arrowhead) isn't cut off by the SVG boundary */
    overflow: visible; 
}

/* The trend line animation */
.trend-line {
    /* Increased dasharray to ensure it covers the path length */
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: drawLine 2s linear forwards;
}

@keyframes drawLine {
    to { stroke-dashoffset: 0; }
}

.title {
    font-size: 72px;
    font-weight: 800;
    color: #ffffff;
    margin-top: 30px;
    letter-spacing: 5px;
}

.subtitle {
    font-size: 18px;
    letter-spacing: 6px;
    font-weight: 600;
    color: #ffffff;
    margin-top: 10px;
    text-transform: uppercase;
}
</style>
</head>

<body>

<div class="logo-container">

<svg viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" 
                viewBox="0 0 10 10" 
                refX="5" refY="5" 
                markerWidth="4" 
                markerHeight="4" 
                orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
        </marker>
    </defs>

    <rect x="25" y="60" width="10" height="50" rx="5" fill="#ffffff"/>
    <rect x="145" y="85" width="8" height="25" rx="4" fill="#ffffff"/>
    <rect x="30" y="85" width="120" height="15" rx="4" fill="#ffffff"/>
    <rect x="42" y="73" width="30" height="12" rx="6" fill="#ffffff"/>

    <path class="trend-line" 
        d="M60 65 L85 40 L115 55 L160 20" 
        stroke="#ffffff" 
        stroke-width="7" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        marker-end="url(#arrow)"/> 
</svg>

<div class="title">SLEEPSMART</div>
<div class="subtitle">Digital Sleep Optimiser</div>

</div>

<script>
const line = document.querySelector('.trend-line');
const svg = document.querySelector('svg');

svg.addEventListener('click', () => {
    line.style.animation = 'none';
    void line.offsetWidth; // Trigger reflow to restart animation
    line.style.animation = 'drawLine 2s linear forwards';
});
</script>

</body>
</html>
