<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SleepSmart Electric Banner</title>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700' rel='stylesheet' type='text/css'>
  <style>
    :root {
      --electric-border-color: #02A2F8;
      --electric-light-color: oklch(from var(--electric-border-color) l c h);
      --gradient-color: oklch(from var(--electric-border-color) 0.3 calc(c / 2) h / 0.4);
      --color-neutral-900: #0a192f; /* Deep midnight blue base */
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background-color: transparent;
      color: white;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .svg-container { position: absolute; width: 0; height: 0; }

    .scene {
      position: relative;
      padding: 100px;
    }

    .banner-container {
      position: relative;
      width: 1000px;
      min-height: 220px;
      border-radius: 24px;
      background: linear-gradient(-30deg, var(--gradient-color), transparent, var(--gradient-color)),
                  linear-gradient(to bottom, var(--color-neutral-900), var(--color-neutral-900));
      cursor: pointer;
      transition: background 0.4s ease, transform 0.3s ease;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .electric-border-layer {
      position: absolute;
      inset: 0;
      border: 2px solid var(--electric-border-color);
      border-radius: 24px;
      pointer-events: none;
      filter: url(#turbulent-displace); 
      z-index: 5;
    }

    .glow-layer {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      pointer-events: none;
    }
    .glow-1 { border: 2px solid var(--electric-border-color); filter: blur(2px); z-index: 2; opacity: 0.8; }
    .glow-2 { border: 2px solid var(--electric-light-color); filter: blur(6px); z-index: 3; opacity: 0.5; }

    .background-glow {
      position: absolute;
      inset: -10px;
      border-radius: 30px;
      filter: blur(32px);
      opacity: 0.2;
      z-index: -1;
      background: radial-gradient(circle, var(--electric-light-color), transparent 70%);
      transition: opacity 0.4s ease;
    }

    .banner-container:hover {
      background: var(--electric-border-color);
      transform: scale(1.02);
    }

    .banner-container:hover .background-glow {
      opacity: 0.6;
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      padding: 40px 60px;
      text-align: center;
    }

    .main-heading {
      font-size: 28px;
      font-weight: 700;
      display: block;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .description {
      font-size: 18px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.9);
      transition: color 0.3s ease;
    }

    .banner-container:hover .description, 
    .banner-container:hover .main-heading {
      color: white;
    }
  </style>
</head>
<body>

  <svg class="svg-container">
    <defs>
      <filter id="turbulent-displace" color-interpolation-filters="sRGB" x="-100%" y="-100%" width="300%" height="300%">
        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="4" result="noise1" seed="1">
            <animate attributeName="seed" from="1" to="100" dur="10s" repeatCount="indefinite" />
        </feTurbulence>
        <feOffset in="noise1" dx="0" dy="0" result="offsetNoise1">
          <animate attributeName="dy" values="700; 0" dur="4s" repeatCount="indefinite" />
        </feOffset>
        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="4" result="noise2" seed="2">
             <animate attributeName="seed" from="100" to="1" dur="10s" repeatCount="indefinite" />
        </feTurbulence>
        <feOffset in="noise2" dx="0" dy="0" result="offsetNoise2">
          <animate attributeName="dy" values="0; -700" dur="4s" repeatCount="indefinite" />
        </feOffset>
        <feComposite in="offsetNoise1" in2="offsetNoise2" result="part1" />
        <feBlend in="part1" in2="SourceGraphic" mode="color-dodge" result="combinedNoise" />
        <feDisplacementMap in="SourceGraphic" in2="combinedNoise" scale="35" xChannelSelector="R" yChannelSelector="B" />
      </filter>
    </defs>
  </svg>

  <div class="scene">
    <div class="banner-container">
      <div class="background-glow"></div>
      <div class="glow-layer glow-1"></div>
      <div class="glow-layer glow-2"></div>
      <div class="electric-border-layer"></div>

      <div class="content-wrapper">
        <span class="main-heading">Take Control of Your Sleep with SleepSmart!</span>
        <span class="description">
          Millions of Australian high school students struggle with healthy sleep due to increasing workloads and excessive screen time. At <strong>SleepSmart</strong>, we aim to fight this critical issue head-on and improve the lifestyles of teenagers nationwide.
        </span>
      </div>
    </div>
  </div>

</body>
</html>
