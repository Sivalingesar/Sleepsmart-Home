<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepSmart | 3D Statistics</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: grid;
            place-content: center;
            min-height: 100vh;
            background: #0f172a; /* Matching your theme */
            font-family: 'Open Sans', sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        .wrapper { 
            width: 100%;
            max-width: 1300px; 
            margin: 0 auto;
            perspective: 2000px; /* Enables the 3D effect */
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .counter-card {
            position: relative;
            list-style: none;
            flex: 1;
            min-width: 250px;
            min-height: 220px;
            padding: 30px 20px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: 700ms cubic-bezier(0.23, 1, 0.32, 1);
            
            /* Initial 3D State */
            transform: translateZ(0);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* The accent border on the left */
        .counter-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 5px;
            background: #02A2F8;
            box-shadow: 0 0 15px #02A2F8;
            border-radius: 15px 0 0 15px;
            transition: 500ms;
        }

        /* Hover Animation: Zoom + Lift */
        .counter-card:hover {
            background: rgba(30, 41, 59, 0.95);
            transform: scale(1.05) translateZ(100px);
            border-color: #02A2F8;
            z-index: 10;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: #0f172a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .icon-box i {
            color: #02A2F8;
            font-size: 1.5rem;
        }

        .count-title { 
            font-family: 'Lilita One', cursive;
            font-size: 42px; 
            color: #ffffff;
            margin: 5px 0;
            letter-spacing: 1px;
        }

        .count-text { 
            font-size: 13px; 
            font-weight: 600;  
            color: #94a3b8;
            text-transform: uppercase;
            line-height: 1.4;
            letter-spacing: 0.5px;
        }

        strong {
            color: #02A2F8;
        }

        /* Making sure it stays in one row on laptops */
        @media (max-width: 1000px) {
            .wrapper {
                flex-wrap: wrap;
            }
            .counter-card {
                min-width: 45%;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="counter-card">
          <div class="icon-box"><i class="fa fa-bed"></i></div>
          <h2 class="timer count-title count-number" data-to="4" data-speed="2000"></h2>
          <p class="count-text">Students meet <strong>Sleep Requirements</strong></p>
        </div>

        <div class="counter-card">
          <div class="icon-box"><i class="fa fa-clock-o"></i></div>
          <h2 class="timer count-title count-number" data-to="69.4" data-speed="2000" data-decimals="1"></h2>
          <p class="count-text">Reported feeling <strong>Sleepy Daily</strong></p>
        </div>

        <div class="counter-card">
          <div class="icon-box"><i class="fa fa-mobile"></i></div>
          <h2 class="timer count-title count-number" data-to="95" data-speed="2000"></h2>
          <p class="count-text">Use <strong>Screens</strong> before bed</p>
        </div>

        <div class="counter-card">
          <div class="icon-box"><i class="fa fa-warning"></i></div>
          <h2 class="timer count-title count-number" data-to="85" data-speed="2000"></h2>
          <p class="count-text">Feel <strong>High Stress</strong> levels</p>
        </div>
    </div>

    <script>
    (function ($) {
        $.fn.countTo = function (options) {
            options = options || {};
            return $(this).each(function () {
                var settings = $.extend({}, $.fn.countTo.defaults, {
                    from: $(this).data('from') || 0,
                    to: $(this).data('to'),
                    speed: $(this).data('speed') || 1000,
                    refreshInterval: $(this).data('refresh-interval') || 100,
                    decimals: $(this).data('decimals') || 0
                }, options);
                
                var loops = Math.ceil(settings.speed / settings.refreshInterval),
                    increment = (settings.to - settings.from) / loops;
                
                var self = this, $self = $(this), loopCount = 0, value = settings.from, data = $self.data('countTo') || {};
                
                $self.data('countTo', data);
                if (data.interval) { clearInterval(data.interval); }
                data.interval = setInterval(updateTimer, settings.refreshInterval);
                render(value);
                
                function updateTimer() {
                    value += increment;
                    loopCount++;
                    render(value);
                    if (loopCount >= loops) {
                        $self.removeData('countTo');
                        clearInterval(data.interval);
                        value = settings.to;
                        render(value); 
                    }
                }
                function render(value) {
                    var formattedValue = settings.formatter.call(self, value, settings);
                    $self.html(formattedValue);
                }
            });
        };
        
        $.fn.countTo.defaults = {
            formatter: function(value, settings) { 
                return value.toFixed(settings.decimals).replace(/\B(?=(?:\d{3})+(?!\d))/g, ',') + '%'; 
            }
        };
    }(jQuery));

    jQuery(function ($) {
        $('.timer').each(function() { 
            $(this).countTo(); 
        });  
    });
    </script>
</body>
</html>
